# PIQBIT — services d'infrastructure (Redis + PostgreSQL)
# Valeurs alignées sur backend/.env :
#   REDIS_URL=redis://localhost:6379
#   DATABASE_URL=postgresql+psycopg://postgres:root@localhost:5432/piqbit
#
# Démarrer :   docker compose up -d
# Arrêter  :   docker compose down        (ajouter -v pour effacer les données)
# Logs     :   docker compose logs -f

services:
  redis:
    image: redis:7-alpine
    container_name: piqbit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    # pgvector/pgvector:pg16 = PostgreSQL 16 + extension `vector` préinstallée
    # (matching sémantique). NOTE : si le volume pg-data a été initialisé avec
    # l'ancienne image postgres:16-alpine (musl) et que le conteneur refuse de
    # démarrer ou que des erreurs de collation apparaissent, réinitialiser la
    # base de dev : `docker compose down -v && docker compose up -d` (les
    # données de démo sont re-seedées au boot du backend). Sans cette image,
    # le matching sémantique fonctionne quand même (fallback Python).
    image: pgvector/pgvector:pg16
    container_name: piqbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: piqbit
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d piqbit"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  pg-data:
